<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EST family LMS 튜토리얼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F2F4F6;--surface:#FFFFFF;--ink:#191F28;--ink2:#4E5968;--ink3:#8B95A1;--line:#E5E8EB;
    --accent:#3182F6;--accent-d:#1B64DA;--accent-soft:#EAF2FE;--success:#15B981;--success-soft:#E6F7F0;
    --gold:#F59E0B;--gold-soft:#FEF3C7;--shadow:0 6px 24px rgba(25,31,40,.10);--radius:18px;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;padding:14px}
  .stage{width:100%;max-width:940px;background:var(--surface);border-radius:26px;box-shadow:var(--shadow);border:1px solid var(--line);
    display:flex;flex-direction:column;max-height:calc(100vh - 28px);overflow:hidden}

  .topbar{display:flex;align-items:center;gap:10px;padding:14px 24px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:14px}
  .brand img{width:24px;height:24px;border-radius:6px;object-fit:contain}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:9px}
  .ghost-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 11px;font-family:inherit;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer}
  .ghost-btn:hover{background:#F9FAFB}
  .day-badge{font-size:11.5px;font-weight:700;color:var(--accent-d);background:var(--accent-soft);padding:6px 11px;border-radius:999px}

  .roadmap{padding:26px 46px 6px}
  .road{position:relative;height:48px}
  .road-track{position:absolute;top:14px;left:0;right:0;height:6px;border-radius:999px;background:var(--line)}
  .road-fill{position:absolute;top:14px;left:0;height:6px;border-radius:999px;background:var(--accent);width:0;transition:width .6s cubic-bezier(.4,0,.2,1)}
  .node{position:absolute;top:10px;width:14px;height:14px;border-radius:999px;background:#fff;border:2.5px solid var(--line);transform:translateX(-50%);transition:border-color .4s;z-index:2;cursor:pointer}
  .node.reached{border-color:var(--accent);background:var(--accent)}
  .node:hover{box-shadow:0 0 0 4px var(--accent-soft)}
  .node .lb{position:absolute;top:16px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9.5px;font-weight:700;color:var(--ink3)}
  .node.reached .lb,.node.current .lb{color:var(--accent-d)}
  .road-char{position:absolute;top:-24px;left:0;transform:translateX(-50%);transition:left .6s cubic-bezier(.4,0,.2,1);z-index:3;pointer-events:none}
  .road-char img{width:44px;height:auto;display:block}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .float{animation:floaty 2.6s ease-in-out infinite}

  .screen{flex:1;min-height:0;overflow:auto;padding:12px 40px 22px}
  .eyebrow{font-size:12px;font-weight:700;color:var(--accent)}
  .h1{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-top:4px}
  .guide{display:flex;gap:14px;align-items:flex-start;margin-top:12px}
  .guide .gchar{flex:none;width:52px}
  .guide .gchar img{width:100%;height:auto;display:block}
  .bubble{position:relative;background:var(--accent-soft);border-radius:16px;padding:12px 14px;font-size:14px;color:var(--ink);font-weight:500;flex:1;white-space:pre-line}
  .bubble::after{content:"";position:absolute;top:16px;left:-9px;border:9px solid transparent;border-right-color:var(--accent-soft);border-left:0}

  .items{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
  .item{flex:1 1 180px;border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .item .ic{font-size:22px}.item .nm{font-weight:800;font-size:14.5px;margin-top:7px}.item .ds{color:var(--ink2);font-size:12.5px;margin-top:4px}

  .mock{margin-top:16px;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(25,31,40,.06)}
  .mock img{width:100%;display:block}
  .mock-cap{color:var(--ink2);font-size:12.5px;font-weight:600;text-align:center;padding:9px 12px;background:#F9FAFB;border-top:1px solid var(--line)}

  .actions{margin-top:16px;display:flex;gap:10px;align-items:center}
  .nav-btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px 15px;font-family:inherit;font-size:14px;font-weight:700;color:var(--ink2);cursor:pointer}
  .nav-btn:disabled{opacity:.35;cursor:default}.nav-btn:not(:disabled):hover{background:#F9FAFB}
  .btn{flex:1;background:var(--accent);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:15px;padding:13px;border-radius:12px;cursor:pointer;transition:background .2s}
  .btn:hover{background:var(--accent-d)}
  .btn.green{background:var(--success)}.btn.green:hover{background:#0E9E6E}

  /* ===== 회원가입 (STEP 0) ===== */
  .su-wrap{max-width:460px;margin:8px auto 0}
  .su-note{background:var(--gold-soft);border:1px solid #FFE1A8;border-radius:12px;padding:10px 13px;font-size:12.5px;font-weight:700;color:#8A6410;margin-top:12px;display:none}
  .su-note.show{display:block}
  .fm{margin-top:12px}
  .fm label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin:12px 0 5px}
  .fm label b{color:#E5484D}
  .fm input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 13px;font-family:inherit;font-size:14px;background:#fff}
  .fm input:focus{outline:none;border-color:var(--accent)}
  .fm .row2{display:flex;gap:10px}.fm .row2>div{flex:1}
  .su-msg{margin-top:11px;font-size:13px;font-weight:700;display:none}
  .su-msg.err{display:block;color:#E5484D}
  .su-msg.ok{display:block;color:var(--success)}
  .su-login{margin-top:13px;text-align:center;font-size:13px;color:var(--ink2)}
  .su-login a{color:var(--accent-d);font-weight:700;text-decoration:none}

  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:300;padding:24px}
  .overlay.show{display:flex}
  .card{background:var(--surface);border-radius:24px;box-shadow:0 20px 60px rgba(15,23,42,.3);padding:30px 28px 26px;text-align:center;width:430px;max-width:100%}
  .card .av img{width:74px;height:auto}
  .card h2{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
  .card p{color:var(--ink2);margin-top:10px;font-size:14.5px;white-space:pre-line}
  .card .btn{margin-top:18px;width:100%}
  .card .ghost-btn{margin-top:9px;width:100%;padding:11px}

  .confetti{position:fixed;inset:0;pointer-events:none;z-index:400;overflow:hidden}
  .confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(106vh) rotate(720deg);opacity:.85}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (max-width:680px){.roadmap,.screen{padding-left:20px;padding-right:20px}.node .lb{display:none}.items{flex-direction:column}}
</style>
</head>
<body>
<div class="stage">
  <div class="topbar">
    <div class="brand"><img src="/estfamily.png" alt="EST family" onerror="this.style.display='none'"><span>EST family LMS</span></div>
    <div class="tb-right">
      <button class="ghost-btn" onclick="restart()">처음부터</button>
      <button class="ghost-btn" onclick="skipAll()">건너뛰기</button>
      <span class="day-badge">LMS 튜토리얼</span>
    </div>
  </div>

  <div class="roadmap" id="roadmap">
    <div class="road" id="road">
      <div class="road-track"></div>
      <div class="road-fill" id="roadFill"></div>
      <div class="road-char float" id="roadChar"><img src="/mascot.png" alt=""></div>
    </div>
  </div>

  <div class="screen" id="screen"></div>
</div>

<div class="overlay" id="doneOverlay">
  <div class="card">
    <div class="av"><img src="/mascot.png" alt=""></div>
    <h2>튜토리얼 완료! 🎉</h2>
    <p>이제 EST family LMS를 자유롭게 사용할 수 있어요.
먼저 AI 역량진단으로 나에게 맞는 강의를 추천받아 보세요.</p>
    <button class="btn green" onclick="location.href='/diagnosis'">🧭 AI 역량진단 하러 가기</button>
    <button class="btn" onclick="location.href='/#/'">홈에서 바로 시작하기</button>
    <button class="ghost-btn" onclick="hideDone()">튜토리얼 다시 보기</button>
  </div>
</div>
<div class="confetti" id="confetti"></div>

<script>
'use strict';
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

// ===== LMS 튜토리얼 단계 (기획서 「LMS UI 기획 · 화면설명」 기반 · 미리보기는 실제 화면 캡처) =====
const STEPS = [
  {
    key: 'home', lb: '홈',
    title: '홈 화면 — 학습자 진입 메인',
    bubble: '로그인하면 가장 먼저 만나는 화면이에요.\n개인화 추천 강의, 진행 중 학습, 새 강의를 한눈에 볼 수 있어요.',
    items: [
      { ic: '✨', nm: '메인 진입 카드', ds: '개인화 추천 카루셀 · 이어 학습 · 오늘의 목표' },
      { ic: '🎬', nm: '추천 강의 영역', ds: '카테고리 칩 · 썸네일 · hover 미리보기' },
      { ic: '📊', nm: '내 학습 / 활동', ds: '진행률 바 · 노트·북마크 · AI 튜터 챗봇' },
    ],
    img: '/tutorial/step1-home.png',
    cap: '홈 = 개인화 추천 강의 · 진행 중 강의 · 새 강의',
  },
  {
    key: 'browse', lb: '강의정보',
    title: '강의 정보 · 내 학습 — 한 화면에서',
    bubble: '내 학습 현황과 분야별 강의 탐색을 한 화면에서 확인해요.\n역량 태그로 나에게 맞는 강의를 바로 모아볼 수 있어요.',
    items: [
      { ic: '📈', nm: '내 학습', ds: '수강 중 강좌 · 진도율 게이지 · 노트·북마크' },
      { ic: '🗂', nm: '강의 분야', ds: '리더십 · 직무역량 · 기술 · 공통 분야 탐색' },
      { ic: '🏷', nm: '역량별 추천 태그', ds: 'E·V·P·O·C·F 매칭 + 난이도·정렬 필터' },
    ],
    img: '/tutorial/step2-browse.png',
    cap: '내 학습 대시보드 + 분야·역량 태그 + 추천 필터',
  },
  {
    key: 'apply', lb: '수강신청',
    title: '수강신청 — 강의 상세 확인 → 바로 신청',
    bubble: '강의 미리보기를 확인하고 한 화면에서 수강신청까지 끝내요.\n신청하면 관리자 승인 후 [내 학습]에 자동 반영돼요.',
    items: [
      { ic: '👀', nm: '강의 미리보기', ds: '썸네일·트레일러 · 강사·시간 · 커리큘럼 펼침' },
      { ic: '✅', nm: '수강신청 폼', ds: '학습 목표 · 희망 완료일 · 알림 설정' },
      { ic: '🔄', nm: '승인 흐름', ds: '신청 → 관리자 승인 → 내 학습 반영' },
    ],
    img: '/tutorial/step3-apply.png',
    cap: '강의 상세 확인 → 수강 신청, 한 화면 완료',
  },
  {
    key: 'detail', lb: '커리큘럼',
    title: '강의정보 — 강의 소개 · 커리큘럼',
    bubble: '강의 핵심 요약과 단원별 학습 흐름을 시각적으로 확인해요.\n수강 후 얻는 역량과 자주 묻는 질문(FAQ)까지 한눈에!',
    items: [
      { ic: '📝', nm: '강의 소개', ds: '핵심 요약 · 얻는 역량 · 강사 프로필 · FAQ' },
      { ic: '📑', nm: '커리큘럼', ds: '챕터별 강의 목록 & 소요 시간 · 미리보기' },
      { ic: '💾', nm: '학습 진도', ds: '단원 클릭 시 진입 · 진도 자동 기록' },
    ],
    img: '/tutorial/step4-detail.png',
    cap: '강의 소개 + 단원별 커리큘럼',
  },
  {
    key: 'player', lb: '강의 재생',
    title: '강의 재생 — 영상 + 노트 + 코드에디터',
    bubble: '영상 재생, 연관 콘텐츠, 강의 노트, 코드 에디터를 한 화면에서!\n진도는 자동 기록되고, AI 튜터 챗봇에게 바로 질문할 수 있어요.',
    items: [
      { ic: '▶️', nm: '강의 재생', ds: '16:9 플레이어 · 속도·자막 · 진도 자동 기록' },
      { ic: '📝', nm: '강의 노트', ds: '타임라인 자동 저장 · 코드 첨부 · export' },
      { ic: '💻', nm: '코드 에디터', ds: '언어 선택 · 샌드박스 실행 · 콘솔 출력' },
    ],
    img: '/tutorial/step5-player.png',
    cap: '영상 재생 + 연관 콘텐츠 + 노트 + 코드 에디터',
  },
  {
    key: 'diag', lb: '역량진단',
    title: 'AI 역량진단 — 나에게 맞는 강의 추천',
    bubble: '역량진단을 완료하면 E·V·P·O·C·F 점수가 시각화되고,\n약점을 보완하는 맞춤 강의가 홈 배너와 [추천강좌]에 자동으로 노출돼요.',
    items: [
      { ic: '🧭', nm: '역량 진단 결과', ds: 'E·V·P·O·C·F 점수 차트 · 강점/보완 TOP 2' },
      { ic: '🎯', nm: '추천 강좌 보기', ds: '약점 보완 추천 6건 · 카드 클릭 시 상세' },
      { ic: '📚', nm: '맞춤 추천 노출', ds: '홈 배너 · [추천강좌]에 자동 반영' },
    ],
    img: '/tutorial/step6-diag.png',
    cap: '진단 점수 → 약점 역량 → 맞춤 추천 강의',
  },
];

const LS_KEY = 'lmsTutorialStep';
let cur = Math.min(Number(localStorage.getItem(LS_KEY)) || 0, STEPS.length - 1);
let AUTHED = false;

const $ = (s) => document.querySelector(s);
const road = $('#road');

function buildRoad() {
  STEPS.forEach((st, i) => {
    const n = document.createElement('div');
    n.className = 'node';
    n.id = 'node' + i;
    n.style.left = (i / (STEPS.length - 1)) * 100 + '%';
    n.innerHTML = `<span class="lb">${st.lb}</span>`;
    n.onclick = () => { if (AUTHED && i <= maxReached()) { cur = i; render(); } };
    road.appendChild(n);
  });
}
function maxReached() { return Math.min(Number(localStorage.getItem(LS_KEY)) || 0, STEPS.length - 1); }

/* ===== STEP 0: 회원가입 (미로그인 시) ===== */
function renderSignup(noticeText) {
  $('#roadmap').style.display = 'none';
  $('#screen').innerHTML = `
    <div class="su-wrap">
      <div class="eyebrow">시작하기 · 회원가입</div>
      <div class="h1">계정을 만들고 튜토리얼을 시작해요</div>
      <div class="guide">
        <div class="gchar"><img src="/mascot.png" alt=""></div>
        <div class="bubble">환영해요! 👋
계정을 만들면 학습 기록·역량진단 결과가 저장돼요. 1분이면 끝나요.</div>
      </div>
      <div class="su-note${noticeText ? ' show' : ''}" id="suNote">${esc(noticeText || '')}</div>
      <div class="fm">
        <label>이름 <b>*</b></label>
        <input id="suName" placeholder="홍길동" maxlength="30" />
        <label>회사 이메일 <b>*</b></label>
        <input id="suEmail" type="email" placeholder="hong@estsoft.com" />
        <label>비밀번호 <b>*</b> <span style="font-weight:500;color:var(--ink3)">(4자 이상)</span></label>
        <input id="suPw" type="password" placeholder="••••••••" />
        <div class="row2">
          <div><label>사번 (UUID) <b>*</b></label><input id="suUuid" placeholder="es12" /></div>
          <div><label>소속 부서 <b>*</b></label><input id="suDept" placeholder="AI서비스팀" /></div>
        </div>
        <div class="su-msg" id="suMsg"></div>
        <div class="actions" style="margin-top:16px">
          <button class="btn" onclick="doSignup()">계정 만들고 튜토리얼 시작 →</button>
        </div>
        <div class="su-login">이미 계정이 있나요? <a href="/login">로그인 하기 →</a></div>
      </div>
    </div>`;
  $('#screen').scrollTop = 0;
}

async function doSignup() {
  const msg = $('#suMsg');
  msg.className = 'su-msg';
  const body = {
    name: $('#suName').value.trim(),
    email: $('#suEmail').value.trim(),
    password: $('#suPw').value,
    uuid: $('#suUuid').value.trim(),
    dept: $('#suDept').value.trim(),
  };
  // 모든 항목 필수 — 입력하지 않으면 다음 단계로 넘어갈 수 없음
  if (!body.name || !body.email || !body.password || !body.uuid || !body.dept) {
    msg.className = 'su-msg err'; msg.textContent = '모든 항목(이름·이메일·비밀번호·사번·소속 부서)을 입력해 주세요.'; return;
  }
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(body.email)) {
    msg.className = 'su-msg err'; msg.textContent = '올바른 이메일 형식이 아니에요. (예: hong@estsoft.com)'; return;
  }
  if (String(body.password).length < 4) {
    msg.className = 'su-msg err'; msg.textContent = '비밀번호는 4자 이상이어야 해요.'; return;
  }
  try {
    const r = await fetch('/api/auth/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) { msg.className = 'su-msg err'; msg.textContent = j.error || ('가입 실패 (HTTP ' + r.status + ')'); return; }
    msg.className = 'su-msg ok'; msg.textContent = '가입 완료! 튜토리얼을 시작합니다 🎉';
    AUTHED = true;
    cur = 0;
    localStorage.setItem(LS_KEY, '0');
    setTimeout(render, 500);
  } catch (e) {
    msg.className = 'su-msg err'; msg.textContent = '가입 실패: ' + e.message;
  }
}

/* ===== 튜토리얼 렌더 ===== */
function render() {
  $('#roadmap').style.display = '';
  localStorage.setItem(LS_KEY, String(Math.max(cur, maxReached())));
  const pct = (cur / (STEPS.length - 1)) * 100;
  $('#roadFill').style.width = pct + '%';
  $('#roadChar').style.left = pct + '%';
  STEPS.forEach((_, i) => {
    const n = $('#node' + i);
    n.classList.toggle('reached', i <= cur);
    n.classList.toggle('current', i === cur);
  });
  const st = STEPS[cur];
  $('#screen').innerHTML = `
    <div class="eyebrow">LMS 튜토리얼 · ${cur + 1} / ${STEPS.length}</div>
    <div class="h1">${st.title}</div>
    <div class="guide">
      <div class="gchar"><img src="/mascot.png" alt=""></div>
      <div class="bubble">${st.bubble}</div>
    </div>
    <div class="items">${st.items.map((it) => `
      <div class="item"><div class="ic">${it.ic}</div><div class="nm">${it.nm}</div><div class="ds">${it.ds}</div></div>`).join('')}
    </div>
    <div class="mock">
      <img src="${st.img}" alt="${esc(st.title)} 화면 캡처" loading="lazy" />
      <div class="mock-cap">${st.cap}</div>
    </div>
    <div class="actions">
      <button class="nav-btn" onclick="prev()" ${cur === 0 ? 'disabled' : ''}>← 이전</button>
      <button class="btn" onclick="next()">${cur === STEPS.length - 1 ? '튜토리얼 완료 🎉' : '다음 →'}</button>
    </div>`;
  $('#screen').scrollTop = 0;
}

function prev() { if (cur > 0) { cur--; render(); } }
function next() {
  if (cur < STEPS.length - 1) { cur++; render(); }
  else finish();
}
function restart() {
  cur = 0;
  localStorage.setItem(LS_KEY, '0');
  if (AUTHED) render(); else renderSignup();
}
function skipAll() {
  // 로그인 상태면 튜토리얼만 건너뛰고 역량진단으로. 미로그인이면 회원가입 강제(건너뛸 수 없음).
  if (AUTHED) { location.href = '/diagnosis'; return; }
  renderSignup('LMS를 사용하려면 먼저 회원가입이 필요해요. 모든 정보를 입력하면 바로 시작할 수 있어요!');
}

function finish() {
  localStorage.setItem(LS_KEY, String(STEPS.length - 1));
  $('#doneOverlay').classList.add('show');
  const box = $('#confetti');
  box.innerHTML = '';
  const colors = ['#3182F6', '#15B981', '#F59E0B', '#E5484D', '#8B5CF6'];
  for (let i = 0; i < 70; i++) {
    const c = document.createElement('i');
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (1.6 + Math.random() * 1.6) + 's';
    c.style.animationDelay = (Math.random() * 0.7) + 's';
    box.appendChild(c);
  }
  setTimeout(() => { box.innerHTML = ''; }, 4200);
}
function hideDone() { $('#doneOverlay').classList.remove('show'); restart(); }

/* ===== 부팅: 로그인 상태에 따라 회원가입/튜토리얼 분기 ===== */
(async function boot() {
  buildRoad();
  try {
    const r = await fetch('/api/auth/me');
    AUTHED = r.ok;
  } catch (e) { AUTHED = false; }
  if (AUTHED) render();
  else renderSignup();
})();
</script>
</body>
</html>
